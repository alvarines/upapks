name: Update F-Droid Repo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install F-Droid Server
        run: sudo apt-get update && sudo apt-get install -y fdroidserver

      - name: Generate Repo Index and Keys
        run: |
          # El comando 'init' crea la configuración básica y las llaves necesarias
          fdroid init --distinguished-name "CN=Mi Repo, OU=Personal, O=F-Droid"
          
          # El comando 'update' con -c y --create-key genera el índice firmado
          fdroid update -c --create-key
        working-directory: .

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: repo # F-Droid genera todo en la carpeta 'repo' de la raíz
          branch: gh-pages
